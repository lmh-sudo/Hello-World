        // === 核心音高偵測演算法 (YIN) ===
        function autoCorrelate(buf, sampleRate) {
            let SIZE = buf.length;
            let rms = 0;
            for (let i = 0; i < SIZE; i++) {
                let val = buf[i];
                rms += val * val;
            }
            rms = Math.sqrt(rms / SIZE);
            if (rms < 0.02) return -1; // 聲音太小

            let r1 = 0, r2 = SIZE - 1, thres = 0.2;
            for (let i = 0; i < SIZE / 2; i++)
                if (Math.abs(buf[i]) < thres) { r1 = i; break; }
            for (let i = 1; i < SIZE / 2; i++)
                if (Math.abs(buf[SIZE - i]) < thres) { r2 = SIZE - i; break; }

            buf = buf.slice(r1, r2);
            SIZE = buf.length;

            let c = new Array(SIZE).fill(0);
            for (let i = 0; i < SIZE; i++)
                for (let j = 0; j < SIZE - i; j++)
                    c[i] = c[i] + buf[j] * buf[j + i];

            let d = 0; while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < SIZE; i++) {
                if (c[i] > maxval) {
                    maxval = c[i];
                    maxpos = i;
                }
            }
            let T0 = maxpos;
            let x1 = c[T0 - 1], x2 = c[T0], x3 = c[T0 + 1];
            let a = (x1 + x3 - 2 * x2) / 2;
            let b = (x3 - x1) / 2;
            if (a) T0 = T0 - b / (2 * a);

            return sampleRate / T0;
        }

        const noteStrings = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        function noteFromPitch(frequency) {
            let noteNum = 12 * (Math.log(frequency / 440) / Math.log(2));
            return Math.round(noteNum) + 69; 
        }
        function getNoteString(noteNum) {
            let octave = Math.floor(noteNum / 12) - 1;
            let noteStr = noteStrings[noteNum % 12];
            return noteStr + octave;
        }

            document.getElementById('btn-end-game').addEventListener('click', endGame);

                btn.onclick = () => handleStartGame(phrase.id);
                phraseButtonsContainer.appendChild(btn);
            });
        }

        async function requestMicAccess() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048;
                analyser.smoothingTimeConstant = AUDIO_SMOOTHING;
                
                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);
                
                switchScreen('SELECT');
            } catch (err) {
                console.error("麥克風存取失敗:", err);
                alert("需要允許麥克風權限才能遊玩喔！");

            speedMultiplier = pendingSpeedMultiplier;
            
            // 更新上方標題為當前選擇的歌曲名稱
            const song = SONGS.find(s => s.id === selectedSong);
            if (song) {
                mainTitleEl.textContent = `直笛音樂節奏練習 - ${song.title}`;
            }

            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            if (countdownTimerId) clearInterval(countdownTimerId);
            
            switchScreen('COUNTDOWN');
            
            let count = 3;
            countdownTextEl.textContent = count;
            
            countdownTimerId = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownTextEl.textContent = count;
                } else {
                    clearInterval(countdownTimerId);
                    startGameLoop(targetPhrase);
                }
            }, 1000);
        }

        function startGameLoop(startPhraseId) {
            switchScreen('PLAYING');
            
            const song = SONGS.find(s => s.id === selectedSong);
            let gameNotes = [];
            
            if (startPhraseId) {
                const phraseIndex = song.phrases.findIndex(p => p.id === startPhraseId);
                const phrasesToPlay = song.phrases.slice(phraseIndex);
                const firstNoteTime = phrasesToPlay[0].notes[0].time;
                
                phrasesToPlay.forEach(p => {
                    p.notes.forEach(n => {
                        gameNotes.push({ 
                            ...n, 
                            time: n.time - firstNoteTime + PRE_ROLL,
                            hit: false, 
                            missed: false, 
                            y: 0 
                        });
                    });
                });
            } else {
                song.phrases.forEach(p => {
                    p.notes.forEach(n => {
                        gameNotes.push({ 
                            ...n, 
                            time: n.time + PRE_ROLL, 
                            hit: false, 
                            missed: false, 
                            y: 0 
                        });
                    });
                });
            }

            // 重置遊戲狀態
            gameState.startTime = performance.now();
            gameState.notes = gameNotes;
            gameState.particles = [];
            gameState.floatingTexts = [];
            gameState.score = 0;
            gameState.combo = 0;
            gameState.maxCombo = 0;
            gameState.currentDetectedPitch = null;
            gameState.isPlaying = true;

            if (audioCtx?.state === 'suspended') {
                audioCtx.resume();
            }

            loop();
        }

        function endGame() {
            gameState.isPlaying = false;
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            
            document.getElementById('final-score').textContent = gameState.score;
            document.getElementById('final-combo').textContent = gameState.maxCombo;
            
            switchScreen('RESULT');
        }

        // === 遊戲主迴圈 ===
        function loop() {
            if (!gameState.isPlaying) return;

            const now = performance.now();
            
            // 修改：將真實流逝的時間乘上播放速度，達成歌曲加速或減速的效果
            const elapsedTime = (now - gameState.startTime) * speedMultiplier;
            
            // 1. 音高偵測
            if (analyser) {
                const bufferLength = analyser.fftSize;
                const buffer = new Float32Array(bufferLength);
                analyser.getFloatTimeDomainData(buffer);
                const freq = autoCorrelate(buffer, audioCtx.sampleRate);
                
                if (freq !== -1) {
                    const noteNum = noteFromPitch(freq);
                    gameState.currentDetectedPitch = getNoteString(noteNum);
                } else {
                    gameState.currentDetectedPitch = null;
                }
            }

            // 更新側邊欄音調顯示
            if (gameState.currentDetectedPitch) {
                pitchDisplayEl.innerText = gameState.currentDetectedPitch;
                pitchDisplayEl.style.color = '#4ade80';
            } else {
                pitchDisplayEl.innerText = '--';
                pitchDisplayEl.style.color = '#475569';
            }

            // 2. 畫布清理與背景
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const laneWidth = canvas.width / LANE_NOTES.length;
            const judgementY = canvas.height - JUDGEMENT_Y_OFFSET;

            // 繪製判定線
            ctx.beginPath();
            ctx.moveTo(0, judgementY);
            ctx.lineTo(canvas.width, judgementY);
            ctx.strokeStyle = gameState.currentDetectedPitch ? '#4ade80' : '#cbd5e1';
            ctx.lineWidth = 4;
            ctx.stroke();

            LANE_NOTES.forEach((noteName, index) => {
                const x = index * laneWidth + laneWidth / 2;
                
                // 繪製軌道底色
                ctx.fillStyle = 'rgba(255, 255, 255, 0.03)';
                ctx.fillRect(index * laneWidth, 0, laneWidth, canvas.height);
                
                // 繪製底部標籤
                ctx.fillStyle = (gameState.currentDetectedPitch === noteName) ? '#22c55e' : '#64748b';
                ctx.font = (gameState.currentDetectedPitch === noteName) ? 'bold 20px sans-serif' : '16px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(noteName, x, canvas.height - 30);
                
                // 繪製感應發光區塊
                if (gameState.currentDetectedPitch === noteName) {
                    const grad = ctx.createLinearGradient(0, judgementY, 0, canvas.height);
                    grad.addColorStop(0, `${NOTE_COLORS[noteName]}88`);
                    grad.addColorStop(1, 'transparent');
                    ctx.fillStyle = grad;
                    ctx.fillRect(index * laneWidth, judgementY, laneWidth, canvas.height - judgementY);
                }
            });

            // 3. 更新與繪製音符
            let allNotesDone = true;
            
            gameState.notes.forEach(note => {
                if (note.hit || note.missed) return;
                allNotesDone = false;

                const timeDiff = note.time - elapsedTime;
                note.y = judgementY - (timeDiff * NOTE_SPEED);
                
                const laneIndex = LANE_NOTES.indexOf(note.pitch);
                const x = laneIndex !== -1 ? laneIndex * laneWidth + laneWidth / 2 : canvas.width / 2;
                const noteColor = NOTE_COLORS[note.pitch] || '#ffffff';

                // 檢查 Miss
                if (timeDiff < -HIT_WINDOW) {
                    note.missed = true;
                    gameState.combo = 0;
                    gameState.score = Math.max(0, gameState.score - 10);
                    addFloatingText("MISS", x, judgementY, '#ef4444');
                } 
                // 檢查 Hit
                else if (Math.abs(timeDiff) <= HIT_WINDOW && gameState.currentDetectedPitch === note.pitch) {
                    note.hit = true;
                    gameState.combo += 1;
                    if (gameState.combo > gameState.maxCombo) gameState.maxCombo = gameState.combo;
                    gameState.score += 50 + (gameState.combo * 5);
                    createParticles(x, judgementY, noteColor);
                    addFloatingText(Math.abs(timeDiff) < 50 ? "PERFECT!" : "GOOD!", x, judgementY - 20, noteColor);
                }

                // 繪製音符
                if (note.y > -50 && note.y < canvas.height + 50) {
                    ctx.beginPath();
                    ctx.arc(x, note.y, 20, 0, Math.PI * 2);
                    ctx.fillStyle = noteColor;
                    ctx.fill();
                    ctx.lineWidth = 3;
                    ctx.strokeStyle = '#ffffff';
                    ctx.stroke();
                    
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 14px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(note.pitch, x, note.y);
                }
            });

            // 4. 更新與繪製粒子特效
            gameState.particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.05;
                
                if (p.life > 0) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 5 * p.life, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life;
                    ctx.fill();
                    ctx.globalAlpha = 1.0;
                } else {
                    gameState.particles.splice(i, 1);
                }
            });

            // 5. 更新與繪製浮動文字
            gameState.floatingTexts.forEach((ft, i) => {
                ft.y -= 1;
                ft.life -= 0.02;
                if (ft.life > 0) {
                    ctx.fillStyle = ft.color;
                    ctx.globalAlpha = ft.life;
                    ctx.font = 'bold 24px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(ft.text, ft.x, ft.y);
                    ctx.globalAlpha = 1.0;
                } else {
                    gameState.floatingTexts.splice(i, 1);
                }
            });

            // 6. 繪製 UI (分數與 Combo)
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(10, 10, 150, 70);
            ctx.fillStyle = '#ffffff';
            ctx.font = '16px sans-serif';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText(`分數: ${gameState.score}`, 20, 20);
            ctx.fillStyle = gameState.combo > 5 ? '#f59e0b' : '#ffffff';
            ctx.font = 'bold 20px sans-serif';
            ctx.fillText(`Combo: ${gameState.combo}`, 20, 45);

            // 結束判定
            if (allNotesDone && gameState.notes.length > 0) {
                const lastNote = gameState.notes[gameState.notes.length - 1];
                if (elapsedTime > lastNote.time + 1000) {
                    endGame();
                    return;
                }
            }

            animationFrameId = requestAnimationFrame(loop);
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 15; i++) {
                gameState.particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1.0,
                    color
                });
            }
        }

        function addFloatingText(text, x, y, color) {
            gameState.floatingTexts.push({ text, x, y, color, life: 1.0 });
        }

        // 啟動腳本
        init();

    </script>
</body>
</html>
