<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Puzzle - 手勢砌圖遊戲</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', monospace; background-color: #09090b; color: white; overflow: hidden; }
        #canvas-container { position: relative; width: 95vw; height: 85vh; border: 1px solid #27272a; border-radius: 0.75rem; overflow: hidden; }
        canvas { width: 100%; height: 100%; object-fit: cover; }
        .neon-text { color: #ccff00; text-shadow: 0 0 10px rgba(204, 255, 0, 0.5); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">

    <div class="mb-4 text-center">
        <h1 class="text-2xl font-bold tracking-widest neon-text uppercase text-[#ccff00]">LIVE PUZZLE</h1>
        <p class="text-zinc-400 text-xs mt-1">GitHub 版：雙手框選截圖，指尖捏合拖拽</p>
    </div>

    <div id="canvas-container" class="bg-zinc-900 shadow-2xl">
        <video id="video" class="hidden" playsinline muted autoplay></video>
        <canvas id="gameCanvas"></canvas>

        <div id="loading-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-zinc-900 z-50">
            <div id="loader-icon" class="w-10 h-10 border-4 border-zinc-700 border-t-[#ccff00] rounded-full animate-spin mb-4"></div>
            <p id="loading-text" class="text-sm tracking-wider uppercase">正在載入 AI 模型...</p>
        </div>

        <div class="absolute top-4 right-4 z-20 text-[10px] text-white/70 bg-black/60 p-3 rounded-lg border border-white/10 text-right pointer-events-none">
            <div id="instruction-scanning">
                <p class="font-bold text-[#ccff00] mb-1">階段 1: 捕捉畫面</p>
                <p>1. 雙手比出 [ ] 框形</p>
                <p>2. 同時捏合雙手 (Pinch) 截圖</p>
            </div>
            <div id="instruction-playing" class="hidden">
                <p class="font-bold text-[#ccff00] mb-1">階段 2: 開始遊戲</p>
                <p>1. 單手捏合 拾取碎片</p>
                <p>2. 拖拽至目標位置放開</p>
                <p class="text-[#ccff00] mt-2">握拳 (Fist) 重置</p>
            </div>
        </div>

        <div id="timer-display" class="hidden absolute top-6 left-1/2 -translate-x-1/2 z-20 bg-zinc-900/80 px-4 py-2 rounded-full border border-white/10">
            <span id="time-text" class="font-mono text-lg font-bold">0:00</span>
        </div>
    </div>

    <script type="module">
        // 修正後的初始化邏輯：確保從 CDN 正確獲取 WASM 資源
        async function initAI() {
            try {
                const vision = await tasksVision.FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
                );
                
                handLandmarker = await tasksVision.HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numHands: 2
                });
                
                console.log("AI Model Loaded");
                startCamera();
            } catch (err) {
                console.error("AI 初始化失敗:", err);
                document.getElementById('loading-text').innerText = "載入失敗: " + err.message;
                document.getElementById('loader-icon').classList.add('hidden');
            }
        }

        // --- 其餘邏輯與之前相同，但確保調用正確的命名空間 ---
        let handLandmarker;
        const video = document.getElementById('video');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const loadingOverlay = document.getElementById('loading-overlay');
        
        let gameState = 'SCANNING';
        let lastVideoTime = -1;
        const ROWS = 3, COLS = 3;
        const PINCH_THRESHOLD = 0.05, FRAME_THRESHOLD = 0.1, RESET_DWELL_MS = 1500;
        
        let puzzleTiles = [], puzzleImageCanvas = null, gameBoardCoords = null;
        let startTime = 0, timeElapsed = 0, fistHoldStart = null;
        let dragInfo = { isDragging: false, tileIndex: null }, smoothCursor = { x: 0, y: 0 };
        let lastFrameCoords = null;

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 1280, height: 720 } 
                });
                video.srcObject = stream;
                video.onloadeddata = () => {
                    loadingOverlay.classList.add('hidden');
                    render();
                };
            } catch (err) {
                alert("無法存取攝影機，請確保已開啟權限並使用 HTTPS 連線。");
            }
        }

        // (此處保留 generatePuzzle, render, handleScanning, captureAndStart, handlePlaying, drawPuzzleBoard 函數內容)
        // ... (內容與先前提供的 html 檔案一致) ...
        
        // 這裡省略重複的邏輯代碼以保持簡潔，請確保將原有的 handlePlaying 等函數貼回此處
        // ⚠️ 重要：確保調用時使用 `tasksVision` 命名空間（若非模組化引入）

        window.onload = initAI;
    </script>
</body>
</html>
