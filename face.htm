<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 人臉識別 - 資料庫管理版</title>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f0f2f5; padding: 20px; }
        
        .container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        
        .video-section { position: relative; }
        video { border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); background-color: #000; }
        canvas { position: absolute; top: 0; left: 0; }

        .controls-section { 
            text-align: left; 
            background: white; 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            min-width: 300px;
            max-width: 400px;
            height: fit-content;
        }

        h3 { margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        input { padding: 10px; font-size: 16px; width: 60%; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box;}
        button#registerBtn { padding: 10px; font-size: 16px; cursor: pointer; background-color: #4CAF50; color: white; border: none; border-radius: 5px; width: 35%; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        
        #status { display: block; margin: 10px 0; font-weight: bold; color: #555; font-size: 0.9em; }

        /* --- 名單列表樣式 --- */
        ul { list-style-type: none; padding: 0; margin-top: 10px; max-height: 400px; overflow-y: auto; }
        
        li.face-item { 
            background: #fff; 
            margin: 8px 0; 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid #eee;
            border-left: 5px solid #2196F3; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        li.face-item:hover {
            background-color: #ffebee; /* 滑鼠移上去變淡紅色 */
            border-left-color: #f44336;
            transform: translateX(5px);
        }

        li.face-item .name { font-weight: bold; font-size: 1.1em; }
        li.face-item .delete-hint { font-size: 0.8em; color: #999; }
        li.face-item:hover .delete-hint { color: #d32f2f; font-weight: bold; content: "刪除"; }

        .empty-list { color: #999; text-align: center; padding: 20px; border: 2px dashed #eee; border-radius: 10px;}
    </style>
</head>
<body>

    <h1>🤖 AI 人臉資料庫管理系統</h1>

    <div class="container">
        <div class="video-section">
            <video id="video" width="720" height="560" autoplay muted></video>
            <canvas id="canvas" width="720" height="560"></canvas>
        </div>

        <div class="controls-section">
            <h3>🎛️ 控制面板</h3>
            <div id="input-group">
                <input type="text" id="nameInput" placeholder="輸入學生名字">
                <button id="registerBtn" disabled>➕ 學習</button>
            </div>
            <span id="status">⏳ 正在初始化 AI 模型...</span>

            <h3 style="margin-top: 20px;">📚 已學習名單 <small style="font-size:0.6em; color:#666; font-weight:normal">(點擊以刪除)</small></h3>
            <ul id="faceList">
                <li class="empty-list">目前沒有資料</li>
            </ul>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const nameInput = document.getElementById('nameInput');
        const registerBtn = document.getElementById('registerBtn');
        const status = document.getElementById('status');
        const faceList = document.getElementById('faceList');

        // 核心資料：儲存所有已學習的人臉數據
        let labeledFaceDescriptors = []; 
        let faceMatcher = null;          

        // 1. 載入模型
        Promise.all([
            faceapi.nets.ssdMobilenetv1.loadFromUri('./models'),     
            faceapi.nets.faceLandmark68Net.loadFromUri('./models'),  
            faceapi.nets.faceRecognitionNet.loadFromUri('./models')  
        ]).then(startVideo).catch(err => console.error("模型載入失敗", err));

        function startVideo() {
            navigator.mediaDevices.getUserMedia({ video: {} })
                .then(stream => {
                    video.srcObject = stream;
                    status.innerText = '✅ 系統就緒';
                })
                .catch(err => console.error(err));
        }

        // 2. 學習人臉 (防呆升級版：限制單人)
        registerBtn.addEventListener('click', async () => {
            const name = nameInput.value.trim();
            if (!name) return alert('請輸入名字！');
            
            // 檢查名字是否重複
            const isDuplicate = labeledFaceDescriptors.some(fd => fd.label === name);
            if (isDuplicate) return alert('這個名字已經存在了，請使用不同名字！');

            status.innerText = '🔍 正在檢查畫面人數...';
            registerBtn.disabled = true;

            // --- 修改重點：改用 detectAllFaces 來計算人數 ---
            const detections = await faceapi.detectAllFaces(video)
                                            .withFaceLandmarks()
                                            .withFaceDescriptors();

            // 情況 A：沒人
            if (detections.length === 0) {
                status.innerText = '⚠️ 偵測不到人臉，請正對鏡頭';
                alert('找不到人臉！請靠近鏡頭。');
            } 
            // 情況 B：多人 (這是您要擋下的情況)
            else if (detections.length > 1) {
                status.innerText = `⚠️ 偵測到 ${detections.length} 張臉，請確保只有一個人在畫面中！`;
                alert(`太擠了！偵測到 ${detections.length} 人。\nAI 會搞混，請確保鏡頭前只有 1 位同學。`);
            } 
            // 情況 C：剛好 1 人 (允許學習)
            else {
                const bestDetection = detections[0]; // 取出唯一的那個人
                
                // 新增數據到陣列
                const descriptor = [bestDetection.descriptor];
                const newFace = new faceapi.LabeledFaceDescriptors(name, descriptor);
                labeledFaceDescriptors.push(newFace);
                
                // 重建 AI 識別器
                updateFaceMatcher();
                
                // 更新畫面列表
                renderFaceList();

                status.innerText = `🎉 成功學習單一人臉：${name}`;
                nameInput.value = ''; 
            }
            
            registerBtn.disabled = false;
        });

        // 3. 重建 AI 比對核心 (當新增或刪除時呼叫)
        function updateFaceMatcher() {
            if (labeledFaceDescriptors.length > 0) {
                // 0.6 是容錯率，越低越嚴格
                faceMatcher = new faceapi.FaceMatcher(labeledFaceDescriptors, 0.6);
            } else {
                faceMatcher = null;
            }
        }

        // 4. 渲染名單列表 (包含刪除功能)
        function renderFaceList() {
            faceList.innerHTML = ''; // 清空目前的 HTML

            if (labeledFaceDescriptors.length === 0) {
                faceList.innerHTML = '<li class="empty-list">資料庫已清空</li>';
                return;
            }

            // 遍歷所有數據，產生 HTML
            labeledFaceDescriptors.forEach((fd, index) => {
                const li = document.createElement('li');
                li.className = 'face-item';
                li.innerHTML = `
                    <span class="name">${fd.label}</span>
                    <span class="delete-hint">🗑️ 刪除</span>
                `;
                
                // 點擊事件：刪除這個人
                li.onclick = () => {
                    if (confirm(`確定要刪除「${fd.label}」的資料嗎？`)) {
                        deleteFace(index);
                    }
                };
                
                // 新增到列表最上方
                faceList.prepend(li);
            });
        }

        // 5. 刪除功能的實作
        function deleteFace(index) {
            const deletedName = labeledFaceDescriptors[index].label;
            
            // 從陣列中移除
            labeledFaceDescriptors.splice(index, 1);
            
            // 更新 AI 和 介面
            updateFaceMatcher();
            renderFaceList();
            
            status.innerText = `🗑️ 已刪除：${deletedName}`;
        }

        // 6. 持續偵測迴圈
        video.addEventListener('play', () => {
            const displaySize = { width: video.width, height: video.height };
            faceapi.matchDimensions(canvas, displaySize);
            
            registerBtn.disabled = false;

            // 定義一個非同步的「接力賽」函數，取代原本的 setInterval
            async function detectLoop() {
                // 如果影片暫停或結束了，就停止偵測
                if (video.paused || video.ended) return; 

                // 🚀 優化秘訣 1：設定 inputSize
                // 預設是 416，改成 224 甚至 160 可以大幅降低電腦負擔，速度快好幾倍！
                const options = new faceapi.SsdMobilenetv1Options({ inputSize: 224, minConfidence: 0.5 });
                
                // 執行辨識 (套用剛設定好的 options)
                const detections = await faceapi.detectAllFaces(video, options).withFaceLandmarks().withFaceDescriptors();
                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

                if (faceMatcher) {
                    const results = resizedDetections.map(d => faceMatcher.findBestMatch(d.descriptor));
                    results.forEach((result, i) => {
                        const box = resizedDetections[i].detection.box;
                        const { label, distance } = result;
                        
                        const boxColor = label === 'unknown' ? 'rgba(255, 0, 0, 0.8)' : 'rgba(0, 255, 0, 0.8)';
                        const drawBox = new faceapi.draw.DrawBox(box, { label: `${label} (${Math.round(distance*100)/100})`, boxColor: boxColor });
                        drawBox.draw(canvas);
                    });
                } else {
                    faceapi.draw.drawDetections(canvas, resizedDetections);
                }

                // 🚀 優化秘訣 2：遞迴呼叫 (Recursive Call)
                // 等到上面的運算跟畫圖都「確實完成」了，我們才休息 100 毫秒，然後呼叫自己進行下一回合。
                // 這樣絕對不會發生「塞車」導致畫面卡死的問題！
                setTimeout(detectLoop, 100); 
            }

            // 呼叫函數，啟動第一次偵測
            detectLoop();
        });
    </script>
</body>
</html>
